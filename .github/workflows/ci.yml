name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  quality:
    name: Python quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install quality tools
        run: pip install -r backend/requirements-dev.txt

      - name: Run Ruff
        run: ruff check backend collector

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: promty_test
          POSTGRES_PASSWORD: promty
          POSTGRES_USER: promty
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U promty -d promty_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgresql+psycopg://promty:promty@127.0.0.1:5432/promty_test
      PROMTY_RUN_POSTGRES_TESTS: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Upgrade test database
        run: alembic -c backend/alembic.ini upgrade head

      - name: Run backend tests
        run: python -m pytest

  collector:
    name: Collector tests and package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install test dependencies
        run: pip install pytest

      - name: Run collector tests
        run: python -m pytest collector/tests

      - name: Verify Python package entry point
        run: |
          pip install ./collector
          promty --help

      - name: Verify npm package contents
        working-directory: collector
        run: npm pack --dry-run

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          cache: npm
          cache-dependency-path: frontend/package-lock.json
          node-version: "22"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run frontend tests
        working-directory: frontend
        run: npm test
