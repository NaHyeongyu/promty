name: AWS Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Backend image tag. Defaults to the commit SHA.
        required: false
        type: string

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_EC2_INSTANCE_ID: ${{ secrets.AWS_EC2_INSTANCE_ID }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  FRONTEND_S3_BUCKET: ${{ secrets.FRONTEND_S3_BUCKET }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
  VITE_PROMPTHUB_API_URL: ${{ secrets.VITE_PROMPTHUB_API_URL }}
  VITE_PROMPTHUB_PUBLISHED_FLOWS_ENABLED: "true"

jobs:
  publish:
    name: Publish AWS artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate EC2 bootstrap script
        run: bash -n infra/aws/promty-ec2-api-user-data.sh

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          cache: npm
          cache-dependency-path: frontend/package-lock.json
          node-version: "22"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Sync frontend to S3
        if: ${{ env.FRONTEND_S3_BUCKET != '' }}
        run: aws s3 sync frontend/dist "s3://${FRONTEND_S3_BUCKET}" --delete

      - name: Invalidate CloudFront
        if: ${{ env.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: >
          aws cloudfront create-invalidation
          --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}"
          --paths "/*"

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          IMAGE_TAG: ${{ inputs.image_tag || github.sha }}
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build \
            --platform linux/amd64 \
            -f backend/Dockerfile \
            -t "${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" \
            -t "${REGISTRY}/${ECR_REPOSITORY}:latest" \
            .
          docker push "${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker push "${REGISTRY}/${ECR_REPOSITORY}:latest"

      - name: Deploy backend to EC2
        if: ${{ env.AWS_EC2_INSTANCE_ID != '' }}
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          PARAMETERS=$(cat <<EOF
          {
            "commands": [
              "set -eu",
              "aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${REGISTRY}",
              "docker pull ${REGISTRY}/${ECR_REPOSITORY}:latest",
              "if grep -q '^PROMPTHUB_ACCESS_TOKEN_TTL_SECONDS=' /opt/promty/backend.env; then sed -i 's/^PROMPTHUB_ACCESS_TOKEN_TTL_SECONDS=.*/PROMPTHUB_ACCESS_TOKEN_TTL_SECONDS=28800/' /opt/promty/backend.env; else echo 'PROMPTHUB_ACCESS_TOKEN_TTL_SECONDS=28800' >> /opt/promty/backend.env; fi",
              "if grep -q '^PROMPTHUB_EVENT_BATCH_MAX_BODY_BYTES=' /opt/promty/backend.env; then sed -i 's/^PROMPTHUB_EVENT_BATCH_MAX_BODY_BYTES=.*/PROMPTHUB_EVENT_BATCH_MAX_BODY_BYTES=8388608/' /opt/promty/backend.env; else echo 'PROMPTHUB_EVENT_BATCH_MAX_BODY_BYTES=8388608' >> /opt/promty/backend.env; fi",
              "if grep -q '^PROMPTHUB_INGEST_RATE_LIMIT_REQUESTS=' /opt/promty/backend.env; then sed -i 's/^PROMPTHUB_INGEST_RATE_LIMIT_REQUESTS=.*/PROMPTHUB_INGEST_RATE_LIMIT_REQUESTS=120/' /opt/promty/backend.env; else echo 'PROMPTHUB_INGEST_RATE_LIMIT_REQUESTS=120' >> /opt/promty/backend.env; fi",
              "if grep -q '^PROMPTHUB_INGEST_RATE_LIMIT_WINDOW_SECONDS=' /opt/promty/backend.env; then sed -i 's/^PROMPTHUB_INGEST_RATE_LIMIT_WINDOW_SECONDS=.*/PROMPTHUB_INGEST_RATE_LIMIT_WINDOW_SECONDS=60/' /opt/promty/backend.env; else echo 'PROMPTHUB_INGEST_RATE_LIMIT_WINDOW_SECONDS=60' >> /opt/promty/backend.env; fi",
              "if grep -q '^PROMPTHUB_TRUSTED_PROXY_CIDRS=' /opt/promty/backend.env; then sed -i 's|^PROMPTHUB_TRUSTED_PROXY_CIDRS=.*|PROMPTHUB_TRUSTED_PROXY_CIDRS=127.0.0.0/8,::1/128,172.16.0.0/12|' /opt/promty/backend.env; else echo 'PROMPTHUB_TRUSTED_PROXY_CIDRS=127.0.0.0/8,::1/128,172.16.0.0/12' >> /opt/promty/backend.env; fi",
              "aws secretsmanager get-secret-value --region ${AWS_REGION} --secret-id promty/prod/openai-api-key --query SecretString --output text | grep -q .",
              "sed -i '/^PROMTY_OPENAI_API_KEY=/d' /opt/promty/backend.env; aws secretsmanager get-secret-value --region ${AWS_REGION} --secret-id promty/prod/openai-api-key --query SecretString --output text | sed 's/^/PROMTY_OPENAI_API_KEY=/' >> /opt/promty/backend.env",
              "if grep -q '^PROMTY_MEMORY_GENERATOR=' /opt/promty/backend.env; then sed -i 's/^PROMTY_MEMORY_GENERATOR=.*/PROMTY_MEMORY_GENERATOR=openai/' /opt/promty/backend.env; else echo 'PROMTY_MEMORY_GENERATOR=openai' >> /opt/promty/backend.env; fi",
              "if grep -q '^PROMTY_MEMORY_DRAFT_GENERATOR=' /opt/promty/backend.env; then sed -i 's/^PROMTY_MEMORY_DRAFT_GENERATOR=.*/PROMTY_MEMORY_DRAFT_GENERATOR=openai/' /opt/promty/backend.env; else echo 'PROMTY_MEMORY_DRAFT_GENERATOR=openai' >> /opt/promty/backend.env; fi",
              "if grep -q '^PROMTY_PROJECT_MEMORY_GENERATOR=' /opt/promty/backend.env; then sed -i 's/^PROMTY_PROJECT_MEMORY_GENERATOR=.*/PROMTY_PROJECT_MEMORY_GENERATOR=openai/' /opt/promty/backend.env; else echo 'PROMTY_PROJECT_MEMORY_GENERATOR=openai' >> /opt/promty/backend.env; fi",
              "docker run --rm --network promty --env-file /opt/promty/backend.env ${REGISTRY}/${ECR_REPOSITORY}:latest python -c \"from app.core.config import settings; from app.services.memory.providers import provider_is_configured; assert settings.memory_draft_generator == 'openai'; assert settings.project_memory_generator == 'openai'; assert provider_is_configured('openai'); print('memory_provider_configured=openai')\"",
              "docker rm -f promty-memory-worker || true",
              "docker rm -f promty-backend || true",
              "docker run -d --name promty-backend --restart unless-stopped --network promty --env-file /opt/promty/backend.env -e PROMPTHUB_PUBLISHED_FLOWS_ENABLED=true -e PROMPTHUB_ADMIN_GITHUB_IDS=191438254 -e PROMPTHUB_DATABASE_POOL_SIZE=5 -e PROMPTHUB_DATABASE_MAX_OVERFLOW=2 ${REGISTRY}/${ECR_REPOSITORY}:latest",
              "sleep 8",
              "docker exec promty-backend python -c \"import urllib.request; print(urllib.request.urlopen('http://127.0.0.1:8011/health/ready', timeout=5).read().decode())\"",
              "docker exec promty-backend alembic -c alembic.ini current --check-heads",
              "docker run -d --name promty-memory-worker --restart unless-stopped --network promty --env-file /opt/promty/backend.env --health-cmd 'python -m app.workers.healthcheck' --health-interval 10s --health-timeout 3s --health-retries 3 --health-start-period 10s -e PROMPTHUB_PUBLISHED_FLOWS_ENABLED=true -e PROMPTHUB_DATABASE_POOL_SIZE=2 -e PROMPTHUB_DATABASE_MAX_OVERFLOW=1 ${REGISTRY}/${ECR_REPOSITORY}:latest python -m app.workers.project_memory",
              "sleep 6",
              "docker exec promty-memory-worker python -m app.workers.healthcheck",
              "docker image prune -f"
            ]
          }
          EOF
          )

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${AWS_EC2_INSTANCE_ID}" \
            --document-name AWS-RunShellScript \
            --comment "Deploy Promty backend ${GITHUB_SHA}" \
            --parameters "${PARAMETERS}" \
            --query "Command.CommandId" \
            --output text)

          if ! aws ssm wait command-executed \
            --command-id "${COMMAND_ID}" \
            --instance-id "${AWS_EC2_INSTANCE_ID}"; then
            aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${AWS_EC2_INSTANCE_ID}" \
              --query "{Status:Status,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}"
            exit 1
          fi

          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${AWS_EC2_INSTANCE_ID}" \
            --query "{Status:Status,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}"
