name: AWS Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Backend image tag. Defaults to the commit SHA.
        required: false
        type: string

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_EC2_INSTANCE_ID: ${{ secrets.AWS_EC2_INSTANCE_ID }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  FRONTEND_S3_BUCKET: ${{ secrets.FRONTEND_S3_BUCKET }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
  VITE_PROMPTHUB_API_URL: ${{ secrets.VITE_PROMPTHUB_API_URL }}

jobs:
  publish:
    name: Publish AWS artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          cache: npm
          cache-dependency-path: frontend/package-lock.json
          node-version: "22"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Sync frontend to S3
        if: ${{ env.FRONTEND_S3_BUCKET != '' }}
        run: aws s3 sync frontend/dist "s3://${FRONTEND_S3_BUCKET}" --delete

      - name: Invalidate CloudFront
        if: ${{ env.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: >
          aws cloudfront create-invalidation
          --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}"
          --paths "/*"

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          IMAGE_TAG: ${{ inputs.image_tag || github.sha }}
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build \
            --platform linux/amd64 \
            -f backend/Dockerfile \
            -t "${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" \
            -t "${REGISTRY}/${ECR_REPOSITORY}:latest" \
            .
          docker push "${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker push "${REGISTRY}/${ECR_REPOSITORY}:latest"

      - name: Deploy backend to EC2
        if: ${{ env.AWS_EC2_INSTANCE_ID != '' }}
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          PARAMETERS=$(cat <<EOF
          {
            "commands": [
              "aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${REGISTRY}",
              "docker pull ${REGISTRY}/${ECR_REPOSITORY}:latest",
              "docker rm -f promty-backend || true",
              "docker run -d --name promty-backend --restart unless-stopped --network promty --env-file /opt/promty/backend.env ${REGISTRY}/${ECR_REPOSITORY}:latest",
              "sleep 8",
              "docker exec promty-backend python -c \"import urllib.request; print(urllib.request.urlopen('http://127.0.0.1:8011/health', timeout=5).read().decode())\"",
              "docker image prune -f"
            ]
          }
          EOF
          )

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${AWS_EC2_INSTANCE_ID}" \
            --document-name AWS-RunShellScript \
            --comment "Deploy Promty backend ${GITHUB_SHA}" \
            --parameters "${PARAMETERS}" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "${COMMAND_ID}" \
            --instance-id "${AWS_EC2_INSTANCE_ID}"

          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${AWS_EC2_INSTANCE_ID}" \
            --query "{Status:Status,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}"
