name: promty

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: promty
      POSTGRES_USER: promty
      POSTGRES_PASSWORD: promty
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promty -d promty"]
      interval: 2s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command:
      - sh
      - -c
      - alembic -c alembic.ini upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8011
    env_file:
      - path: docker/compose.env
        required: true
      - path: .env.local
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://promty:promty@postgres:5432/promty
      PROMTY_API_PUBLIC_URL: http://127.0.0.1:8011
      PROMTY_APP_URL: http://127.0.0.1:5173
      PROMTY_CORS_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
      PROMTY_DATABASE_POOL_SIZE: "5"
      PROMTY_DATABASE_MAX_OVERFLOW: "2"
      PROMTY_DATABASE_POOL_TIMEOUT_SECONDS: "5"
      PROMTY_DATABASE_POOL_RECYCLE_SECONDS: "300"
      PROMTY_SESSION_COOKIE_SECURE: "false"
      PROMTY_PUBLISHED_FLOWS_ENABLED: "true"
    ports:
      - "8011:8011"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8011/health/ready')
      interval: 5s
      timeout: 3s
      retries: 20

  memory-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command:
      - python
      - -m
      - app.workers.project_memory
    env_file:
      - path: docker/compose.env
        required: true
      - path: .env.local
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://promty:promty@postgres:5432/promty
      PROMTY_DATABASE_POOL_SIZE: "2"
      PROMTY_DATABASE_MAX_OVERFLOW: "1"
      PROMTY_DATABASE_POOL_TIMEOUT_SECONDS: "5"
      PROMTY_DATABASE_POOL_RECYCLE_SECONDS: "300"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-m", "app.workers.healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  frontend:
    image: node:22-alpine
    working_dir: /app/frontend
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_PROMTY_API_URL: http://127.0.0.1:8011
      VITE_PROMTY_PUBLISHED_FLOWS_ENABLED: "true"
    volumes:
      - .:/app
      - frontend-node-modules:/app/frontend/node_modules
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres-data:
  frontend-node-modules:
