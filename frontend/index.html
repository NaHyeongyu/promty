<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PromptHub Timeline Preview</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: #1f2933;
        background: #f4f7f6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        font-weight: 700;
      }

      button {
        min-height: 36px;
        border: 1px solid #bdc7d1;
        border-radius: 6px;
        padding: 0 14px;
        color: #102a43;
        background: #ffffff;
        cursor: pointer;
      }

      button:hover {
        background: #edf2f7;
      }

      .status {
        min-height: 24px;
        margin-bottom: 14px;
        color: #52606d;
        font-size: 14px;
      }

      .timeline {
        display: grid;
        gap: 12px;
        padding: 0;
        margin: 0;
        list-style: none;
      }

      .event {
        border: 1px solid #d9e2ec;
        border-radius: 8px;
        padding: 16px;
        background: #ffffff;
      }

      .event-top {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
      }

      .badge {
        border-radius: 999px;
        padding: 3px 8px;
        font-size: 12px;
        font-weight: 700;
        background: #e6f6ff;
        color: #0967d2;
      }

      .muted {
        color: #627d98;
        font-size: 13px;
      }

      .prompt {
        margin: 0 0 12px;
        white-space: pre-wrap;
        line-height: 1.5;
      }

      dl {
        display: grid;
        grid-template-columns: 140px minmax(0, 1fr);
        gap: 6px 12px;
        margin: 0;
        font-size: 13px;
      }

      dt {
        color: #627d98;
      }

      dd {
        min-width: 0;
        margin: 0;
        overflow-wrap: anywhere;
      }

      @media (max-width: 640px) {
        header {
          align-items: flex-start;
          flex-direction: column;
        }

        dl {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>PromptHub Timeline</h1>
        <button id="refresh" type="button">Refresh</button>
      </header>
      <div class="status" id="status"></div>
      <ol class="timeline" id="timeline"></ol>
    </main>

    <script>
      const apiBaseUrl =
        new URLSearchParams(window.location.search).get("api") ||
        "http://127.0.0.1:8011/api";
      const timeline = document.querySelector("#timeline");
      const status = document.querySelector("#status");
      const refresh = document.querySelector("#refresh");

      function summarize(event) {
        if (event.event_type === "PromptSubmitted") {
          return event.payload.prompt;
        }
        if (event.event_type === "FilesChanged") {
          return (event.payload.files || []).join(", ");
        }
        if (event.event_type === "CommitCreated") {
          return [event.payload.hash, event.payload.message].filter(Boolean).join(" ");
        }
        return event.event_type;
      }

      function appendRow(list, label, value) {
        if (!value) return;
        const term = document.createElement("dt");
        const description = document.createElement("dd");
        term.textContent = label;
        description.textContent = String(value);
        list.append(term, description);
      }

      function render(events) {
        timeline.innerHTML = "";
        if (events.length === 0) {
          status.textContent = "No events returned from the backend.";
          return;
        }

        status.textContent = `${events.length} event(s) loaded from ${apiBaseUrl}`;
        events
          .slice()
          .sort((a, b) => {
            const sessionCompare = a.session_id.localeCompare(b.session_id);
            if (sessionCompare !== 0) return sessionCompare;
            return a.sequence - b.sequence;
          })
          .forEach((event) => {
            const item = document.createElement("li");
            const article = document.createElement("article");
            const top = document.createElement("div");
            const badge = document.createElement("span");
            const tool = document.createElement("span");
            const sequence = document.createElement("span");
            const time = document.createElement("time");
            const prompt = document.createElement("p");
            const details = document.createElement("dl");

            item.className = "event";
            top.className = "event-top";
            badge.className = "badge";
            badge.textContent = event.event_type;
            tool.className = "muted";
            tool.textContent = event.tool;
            sequence.className = "muted";
            sequence.textContent = `#${event.sequence}`;
            time.className = "muted";
            time.dateTime = event.timestamp;
            time.textContent = new Date(event.timestamp).toLocaleString();
            prompt.className = "prompt";
            prompt.textContent = summarize(event) || "";

            appendRow(details, "Session", event.session_id);
            appendRow(details, "Project", event.project_id);
            appendRow(details, "Model", event.payload.model);
            appendRow(details, "Working directory", event.payload.cwd);
            appendRow(details, "Transcript", event.payload.transcript_path);

            top.append(badge, tool, sequence, time);
            article.append(top, prompt, details);
            item.appendChild(article);
            timeline.appendChild(item);
          });
      }

      async function loadEvents() {
        status.textContent = "Loading events...";
        try {
          const response = await fetch(`${apiBaseUrl}/events`);
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          render(await response.json());
        } catch (error) {
          timeline.innerHTML = "";
          status.textContent = `Could not load events: ${error.message}`;
        }
      }

      refresh.addEventListener("click", loadEvents);
      loadEvents();
    </script>
  </body>
</html>
